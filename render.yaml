services:
  - type: web
    name: virtual-notary-manager
    env: node
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: OLLAMA_URL
        value: https://ollama-service.onrender.com
      - key: LLM_MODEL
        value: qwen2.5:3b
