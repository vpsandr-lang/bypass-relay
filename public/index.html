<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Виртуальный офис-менеджер — Нотариальная контора</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Главный контейнер -->
    <div id="app">
        <!-- Боковая панель с 3D аватаром -->
        <div id="avatar-panel">
            <div id="avatar-container"></div>
            <div id="status-bar">
                <span id="status-indicator" class="status-online"></span>
                <span id="status-text">Елена — готова помочь</span>
            </div>
            <div id="webcam-container">
                <video id="webcam-feed" autoplay muted playsinline></video>
                <div id="webcam-label">Камера посетителя</div>
            </div>
        </div>

        <!-- Основная панель -->
        <div id="main-panel">
            <!-- Шапка -->
            <header id="header">
                <div class="logo">
                    <h1>Нотариальная контора "Нотариус+"</h1>
                    <p>Виртуальный офис-менеджер Елена</p>
                </div>
                <div class="header-actions">
                    <button id="btn-mic" class="btn btn-mic" title="Голосовой ввод">
                        <span class="icon">🎤</span>
                    </button>
                    <button id="btn-speak" class="btn btn-speak" title="Озвучивать ответы">
                        <span class="icon">🔊</span>
                    </button>
                    <button id="btn-fullscreen" class="btn" title="На весь экран">
                        <span class="icon">⛶</span>
                    </button>
                </div>
            </header>

            <!-- Чат -->
            <div id="chat-container">
                <div id="chat-messages">
                    <div class="message system">
                        <div class="msg-content">
                            Здравствуйте! Я Елена, виртуальный офис-менеджер. 
                            Могу проконсультировать вас по услугам нотариуса и записать на приём.
                        </div>
                    </div>
                </div>
                <div id="typing-indicator" class="hidden">
                    <span class="dot"></span>
                    <span class="dot"></span>
                    <span class="dot"></span>
                </div>
            </div>

            <!-- Панель ввода -->
            <div id="input-panel">
                <div id="quick-actions">
                    <button class="quick-btn" data-question="Какие услуги вы предоставляете?">📋 Услуги</button>
                    <button class="quick-btn" data-question="Какие документы нужны для доверенности?">📄 Доверенность</button>
                    <button class="quick-btn" data-question="Сколько стоит заверение документов?">💰 Цены</button>
                    <button class="quick-btn" data-question="Хочу записаться на приём">📅 Запись</button>
                </div>
                <div id="input-row">
                    <input type="text" id="message-input" placeholder="Введите ваш вопрос..." autocomplete="off">
                    <button id="btn-send" class="btn btn-send">Отправить</button>
                    <button id="btn-appointment" class="btn btn-appointment">📅 Записаться</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Модальное окно записи на приём -->
    <div id="appointment-modal" class="modal hidden">
        <div class="modal-content">
            <span class="modal-close">×</span>
            <h2>Запись на приём к нотариусу</h2>
            <form id="appointment-form">
                <div class="form-group">
                    <label>ФИО *</label>
                    <input type="text" id="apt-name" required placeholder="Иванов Иван Иванович">
                </div>
                <div class="form-group">
                    <label>Телефон</label>
                    <input type="tel" id="apt-phone" placeholder="+7 (999) 123-45-67">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="apt-email" placeholder="example@mail.ru">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Дата *</label>
                        <input type="date" id="apt-date" required>
                    </div>
                    <div class="form-group">
                        <label>Время *</label>
                        <input type="time" id="apt-time" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Тип услуги</label>
                    <select id="apt-service">
                        <option value="">Выберите услугу</option>
                        <option value="notarization">Заверение документов</option>
                        <option value="power_of_attorney">Доверенность</option>
                        <option value="will">Завещание</option>
                        <option value="inheritance">Наследство</option>
                        <option value="contract">Договор купли-продажи</option>
                        <option value="consultation">Консультация</option>
                        <option value="other">Другое</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Примечания</label>
                    <textarea id="apt-notes" rows="3" placeholder="Дополнительная информация"></textarea>
                </div>
                <button type="submit" class="btn btn-submit">Записаться</button>
            </form>
        </div>
    </div>

    <!-- Подключение скриптов -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
            "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@2.0.2/lib/three-vrm.module.js"
        }
    }
    </script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script type="module" src="js/avatar.js"></script>
    <script type="module" src="js/speech.js"></script>
    <script type="module" src="js/webcam.js"></script>
    <script type="module" src="js/appointments.js"></script>
    <script type="module" src="js/main.js"></script>
</body>
</html>
